version: '3.8'

services:
  db:
    image: postgres:15
    container_name: njangi_postgres
    restart: always
    environment:
      POSTGRES_DB: njangi_db
      POSTGRES_USER: njangi_user
      POSTGRES_PASSWORD: njangi_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: njangi_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
